<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ECOEMY · Student Exam Portal (View & Download Tests)</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- html2pdf library for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* LIQUID GLASS VARIABLES (matching ECOEMY theme) */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.18);
            --glass-border: rgba(255, 255, 255, 0.25);
            --glass-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), 0 4px 12px rgba(0, 0, 0, 0.05);
            --backdrop-blur: blur(12px) saturate(180%);
            --text-light: #f2f2f2;
            --deep-bg-start: #0b0f1c;
            --deep-bg-end: #19233f;
            --gold-accent: #ffd966;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(145deg, var(--deep-bg-start), var(--deep-bg-end));
            min-height: 100vh;
            color: var(--text-light);
            backdrop-filter: blur(2px);
            margin: 0;
            line-height: 1.5;
            padding-bottom: 3rem;
        }

        html { scroll-behavior: smooth; }

        /* === GLASS NAVIGATION === */
        nav {
            position: sticky;
            top: 1.2rem;
            z-index: 1000;
            max-width: 1400px;
            margin: 0 auto 1rem auto;
            width: 95%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 2rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--backdrop-blur);
            border-radius: 60px;
            box-shadow: var(--glass-shadow);
        }

        .logo h2 {
            font-weight: 600;
            font-size: 1.8rem;
            background: linear-gradient(130deg, #ffffff, #ffe6b0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo span { font-weight: 300; }

        .nav-links {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .nav-links a:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.3);
        }
        .btn-special {
            background: rgba(242, 169, 0, 0.75) !important;
            border: 1px solid rgba(255, 215, 100, 0.9) !important;
            color: #0a0a14 !important;
            font-weight: 700 !important;
        }

        /* MAIN CONTAINER */
        .student-portal {
            max-width: 1300px;
            width: 95%;
            margin: 1.5rem auto;
            background: var(--glass-bg);
            backdrop-filter: var(--backdrop-blur);
            border-radius: 48px;
            border: 1px solid var(--glass-border);
            padding: 2rem;
            box-shadow: var(--glass-shadow);
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            border-bottom: 2px solid rgba(255,215,100,0.4);
            padding-bottom: 1rem;
        }
        .title-area h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #fff, #ffecb3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .title-area p {
            color: rgba(255,255,240,0.8);
            margin-top: 0.3rem;
        }

        /* Exam cards grid */
        .exams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.8rem;
            margin: 2rem 0;
        }
        .exam-card {
            background: rgba(25, 30, 50, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            border: 1px solid rgba(255,215,100,0.3);
            padding: 1.5rem;
            transition: all 0.25s ease;
            cursor: pointer;
        }
        .exam-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold-accent);
            background: rgba(45, 50, 75, 0.7);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.4);
        }
        .exam-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffecb3;
            margin-bottom: 0.5rem;
        }
        .exam-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: #cfc5a5;
            margin: 0.8rem 0;
            flex-wrap: wrap;
        }
        .exam-meta span {
            background: rgba(0,0,0,0.3);
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
        }
        .exam-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 1rem;
        }
        .btn-download {
            background: rgba(242, 169, 0, 0.8);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            color: #0b0715;
            font-size: 0.9rem;
        }
        .btn-download:hover {
            background: #f3cf8a;
            transform: scale(1.02);
        }
        .btn-view {
            background: rgba(255,255,255,0.15);
            border: 1px solid var(--glass-border);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            color: #f5f0e0;
            cursor: pointer;
            transition: 0.2s;
            margin-right: 0.8rem;
        }
        .btn-view:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Modal for previewing exam */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(16px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }
        .modal.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: rgba(20, 25, 45, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,215,100,0.5);
            border-radius: 48px;
            width: 90%;
            max-width: 900px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5);
        }
        .modal-close {
            position: absolute;
            top: 1.2rem;
            right: 1.5rem;
            font-size: 1.8rem;
            cursor: pointer;
            color: #ffd966;
        }
        .preview-header {
            text-align: center;
            border-bottom: 2px solid #ffd966;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }
        .preview-question {
            margin-bottom: 1.8rem;
            background: rgba(255,255,255,0.05);
            border-radius: 28px;
            padding: 1rem;
        }
        .floating-orbs {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255,215,150,0.12) 0%, transparent 80%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }
        .floating-orbs-right {
            position: fixed;
            top: 100px;
            right: 20px;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(150,200,255,0.1) 0%, transparent 80%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }
        footer {
            max-width: 1300px;
            width: 95%;
            margin: 2rem auto;
            padding: 1.5rem;
            background: rgba(20,25,45,0.45);
            backdrop-filter: blur(14px);
            border-radius: 60px;
            text-align: center;
            font-size: 0.85rem;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #cfc5a5;
        }
        @media (max-width: 700px) {
            .student-portal { padding: 1.2rem; }
            .header-section { flex-direction: column; align-items: start; gap: 1rem; }
        }
    </style>
</head>
<body>
    
    <div id="orb1"></div>
    <div id="orb2"></div>

    <nav>
        <div class="logo"><h2>ECO<span>EMY</span></h2></div>
        <div class="nav-links">
            <a href="STu.exam.html"><i class="fas fa-file-alt"></i> My Exams</a>
            <a href="Rosouresstoey.html"><i class="fas fa-book"></i> Resources Shop</a>
            <a href="Rosoures.html"><i class="fas fa-book-open"></i> Resources</a>
            <a href="classes.html"><i class="fas fa-chalkboard-teacher"></i> Classes</a>
            <a href="Dashboard.html"><i class="fas fa-user-graduate"></i> Profile</a>
        </div>
    </nav>
    
    <main class="student-portal">
        <div class="header-section">
            <div class="title-area">
                <h1><i class="fas fa-graduation-cap"></i> Student Exam Portal</h1>
                <p>View and download available tests & assessments</p>
            </div>
            <div class="action-bar">
                <button id="refreshBtn" class="btn-download" style="background: rgba(255,255,255,0.15); color:#f5f0e0;"><i class="fas fa-sync-alt"></i> Refresh</button>
            </div>
        </div>

        <div id="examsGridContainer" class="exams-grid">
            <!-- dynamic exam cards will appear here -->
        </div>
        <div id="emptyExamsMsg" class="empty-state" style="display: none;">📚 No exams available at the moment. Check back later!</div>
    </main>

    <footer>
        <p>© 2026 ECOEMY Student Portal — Access your assessments anytime, anywhere.</p>
    </footer>

    <!-- Preview Modal -->
    <div id="previewModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" id="closeModalBtn">&times;</span>
            <div id="modalPreviewBody"></div>
            <div style="display: flex; justify-content: flex-end; margin-top: 1.5rem;">
                <button id="modalDownloadBtn" class="btn-download"><i class="fas fa-download"></i> Download as PDF</button>
            </div>
        </div>
    </div>

    <script>
        // ---------- SAMPLE EXAMS DATABASE (simulating teacher-created exams) ----------
        // Each exam object matches the structure from teacher's exam builder
        let examsDatabase = [
            {
                id: 1,
                title: "Economics Midterm 2026",
                subject: "Economics",
                date: "April 15, 2026",
                totalMarks: 28,
                questions: [
                    {
                        type: "mcq",
                        text: "What is the primary characteristic of a market economy?",
                        options: ["Central planning", "Government ownership", "Private property & price signals", "Barter system"],
                        correctOptionIndex: 2,
                        marks: 2
                    },
                    {
                        type: "mcq",
                        text: "Which of the following is a factor of production?",
                        options: ["Money", "Demand", "Capital", "Price"],
                        correctOptionIndex: 2,
                        marks: 1
                    },
                    {
                        type: "text",
                        text: "Explain the impact of globalization on emerging markets. Provide relevant examples.",
                        wordLimit: 120,
                        marks: 8
                    },
                    {
                        type: "text",
                        text: "Discuss the advantages and disadvantages of free trade agreements.",
                        wordLimit: 100,
                        marks: 6
                    }
                ]
            },
            {
                id: 2,
                title: "Business Studies - Final Assessment",
                subject: "Business Management",
                date: "May 5, 2026",
                totalMarks: 35,
                questions: [
                    {
                        type: "mcq",
                        text: "What is the main purpose of SWOT analysis?",
                        options: ["Financial forecasting", "Strategic planning", "Employee evaluation", "Market segmentation"],
                        correctOptionIndex: 1,
                        marks: 2
                    },
                    {
                        type: "text",
                        text: "Describe the key differences between leadership and management.",
                        wordLimit: 150,
                        marks: 10
                    },
                    {
                        type: "text",
                        text: "Explain the concept of Corporate Social Responsibility (CSR) and provide two real-world examples.",
                        wordLimit: 120,
                        marks: 8
                    },
                    {
                        type: "mcq",
                        text: "Which organizational structure is most flexible?",
                        options: ["Hierarchical", "Matrix", "Line", "Functional"],
                        correctOptionIndex: 1,
                        marks: 2
                    }
                ]
            },
            {
                id: 3,
                title: "Mathematics - Algebra & Calculus",
                subject: "Mathematics",
                date: "June 10, 2026",
                totalMarks: 40,
                questions: [
                    {
                        type: "text",
                        text: "Solve for x: 2x² - 5x + 3 = 0. Show all steps.",
                        wordLimit: 80,
                        marks: 5
                    },
                    {
                        type: "text",
                        text: "Find the derivative of f(x) = 3x⁴ - 2x³ + 7x - 1. Explain your method.",
                        wordLimit: 100,
                        marks: 8
                    },
                    {
                        type: "mcq",
                        text: "What is the value of ∫(2x) dx from 0 to 3?",
                        options: ["6", "9", "3", "12"],
                        correctOptionIndex: 1,
                        marks: 3
                    }
                ]
            },
            {
                id: 4,
                title: "English Literature - Poetry Analysis",
                subject: "English",
                date: "April 28, 2026",
                totalMarks: 25,
                questions: [
                    {
                        type: "text",
                        text: "Analyze the use of imagery in William Wordsworth's 'Daffodils'. Provide textual evidence.",
                        wordLimit: 200,
                        marks: 12
                    },
                    {
                        type: "text",
                        text: "Compare and contrast the themes of love and loss in two poems of your choice.",
                        wordLimit: 180,
                        marks: 13
                    }
                ]
            }
        ];

        // Store current exam for modal preview
        let currentPreviewExam = null;

        // Helper: escape HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Render exam cards
        function renderExamCards() {
            const container = document.getElementById('examsGridContainer');
            const emptyMsg = document.getElementById('emptyExamsMsg');
            if (!container) return;
            
            if (examsDatabase.length === 0) {
                container.innerHTML = '';
                emptyMsg.style.display = 'block';
                return;
            }
            emptyMsg.style.display = 'none';
            container.innerHTML = '';
            
            examsDatabase.forEach(exam => {
                const card = document.createElement('div');
                card.className = 'exam-card';
                // Calculate total marks if not precomputed
                let total = exam.totalMarks || 0;
                if (!exam.totalMarks && exam.questions) {
                    total = exam.questions.reduce((sum, q) => sum + (q.marks || 0), 0);
                }
                const questionCount = exam.questions.length;
                card.innerHTML = `
                    <div class="exam-title">${escapeHtml(exam.title)}</div>
                    <div class="exam-meta">
                        <span><i class="fas fa-book"></i> ${escapeHtml(exam.subject)}</span>
                        <span><i class="fas fa-calendar-alt"></i> ${escapeHtml(exam.date)}</span>
                        <span><i class="fas fa-star"></i> ${total} marks</span>
                        <span><i class="fas fa-question-circle"></i> ${questionCount} questions</span>
                    </div>
                    <div class="exam-actions">
                        <button class="btn-view" data-id="${exam.id}"><i class="fas fa-eye"></i> Preview</button>
                        <button class="btn-download" data-id="${exam.id}"><i class="fas fa-download"></i> Download PDF</button>
                    </div>
                `;
                const viewBtn = card.querySelector('.btn-view');
                const downloadBtn = card.querySelector('.btn-download');
                viewBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openPreviewModal(exam.id);
                });
                downloadBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    downloadExamAsPDF(exam);
                });
                container.appendChild(card);
            });
        }

        // Open preview modal
        function openPreviewModal(examId) {
            const exam = examsDatabase.find(e => e.id === examId);
            if (!exam) return;
            currentPreviewExam = exam;
            const modal = document.getElementById('previewModal');
            const modalBody = document.getElementById('modalPreviewBody');
            
            // Build preview content
            let totalMarks = exam.totalMarks || exam.questions.reduce((sum, q) => sum + (q.marks || 0), 0);
            let html = `
                <div class="preview-header">
                    <div style="display: flex; justify-content: center; gap: 12px; margin-bottom: 8px;">
                        <i class="fas fa-graduation-cap" style="font-size: 2.5rem; color: #ffd966;"></i>
                        <h2 style="font-size: 1.8rem; background: linear-gradient(135deg, #fff, #ffecb3); -webkit-background-clip: text; background-clip: text; color: transparent;">ECOEMY ACADEMY</h2>
                    </div>
                    <h3 style="font-size: 1.5rem; margin: 0.5rem 0;">${escapeHtml(exam.title)}</h3>
                    <p><strong>Subject:</strong> ${escapeHtml(exam.subject)} &nbsp;|&nbsp; <strong>Date:</strong> ${escapeHtml(exam.date)}</p>
                    <p><strong>Total Marks:</strong> ${totalMarks}</p>
                </div>
                <div id="previewQuestionsList">
            `;
            
            exam.questions.forEach((q, idx) => {
                const qNum = idx + 1;
                html += `<div style="margin-bottom: 1.5rem; background: rgba(255,255,255,0.05); border-radius: 24px; padding: 1rem;">
                    <div style="display: flex; justify-content: space-between; flex-wrap: wrap; margin-bottom: 0.5rem;">
                        <strong>Question ${qNum} [${q.type === 'mcq' ? 'MCQ' : 'Text based'}]</strong>
                        <span style="background: #ffd96620; padding: 0.2rem 0.8rem; border-radius: 40px;">${q.marks} marks</span>
                    </div>
                    <p style="margin: 0.5rem 0;">${escapeHtml(q.text)}</p>`;
                
                if (q.type === 'mcq' && q.options) {
                    html += `<div style="margin-left: 1rem; margin-top: 0.5rem;">`;
                    q.options.forEach((opt, optIdx) => {
                        const letter = String.fromCharCode(65 + optIdx);
                        html += `<div style="margin: 5px 0;">${letter}. ${escapeHtml(opt)}</div>`;
                    });
                    html += `</div>`;
                } else if (q.type === 'text') {
                    // Show answer lines in preview (clean, no extra text)
                    const lineCount = Math.min(10, Math.max(4, Math.floor((q.wordLimit || 100) / 15) + 2));
                    html += `<div style="margin-top: 0.8rem;">`;
                    for (let l = 0; l < lineCount; l++) {
                        html += `<div style="height: 20px; border-bottom: 1px solid #ffd96660; margin-bottom: 8px; width: 100%;"></div>`;
                    }
                    html += `</div>`;
                }
                html += `<div style="margin-top: 0.5rem; font-size: 0.8rem; text-align: right;">[${q.marks} marks]</div>`;
                html += `</div>`;
            });
            
            html += `</div>`;
            modalBody.innerHTML = html;
            modal.classList.add('active');
        }
        
        // Download single exam as PDF (student version)
        async function downloadExamAsPDF(exam) {
            if (!exam) return;
            
            const totalMarks = exam.totalMarks || exam.questions.reduce((sum, q) => sum + (q.marks || 0), 0);
            
            const pdfContent = document.createElement('div');
            pdfContent.style.backgroundColor = '#0f0c1a';
            pdfContent.style.color = '#f2f2f2';
            pdfContent.style.fontFamily = "'Inter', 'Segoe UI', sans-serif";
            pdfContent.style.padding = '2rem';
            pdfContent.style.borderRadius = '24px';
            pdfContent.style.maxWidth = '1100px';
            pdfContent.style.margin = '0 auto';
            
            pdfContent.innerHTML = `
                <div style="text-align: center; border-bottom: 2px solid #ffd966; padding-bottom: 1.2rem; margin-bottom: 1.8rem;">
                    <div style="display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 8px;">
                        <i class="fas fa-graduation-cap" style="font-size: 3rem; color: #ffd966;"></i>
                        <h1 style="font-size: 2.2rem; background: linear-gradient(135deg, #ffffff, #ffe6b0); -webkit-background-clip: text; background-clip: text; color: transparent; margin:0;">ECOEMY ACADEMY</h1>
                    </div>
                    <p style="letter-spacing: 1px; font-size: 0.85rem;">Empowering Global Education | Student Assessment</p>
                    <hr style="border-color: rgba(255,215,100,0.3); margin: 0.8rem 0;">
                    <h2 style="font-size: 1.8rem; margin-top: 0.5rem;">${escapeHtml(exam.title)}</h2>
                    <p><strong>Subject:</strong> ${escapeHtml(exam.subject)} &nbsp;|&nbsp; <strong>Date:</strong> ${escapeHtml(exam.date)}</p>
                </div>
                <div id="pdfQuestionsArea"></div>
                <div style="margin-top: 2rem; text-align: right; font-size: 0.75rem; border-top: 1px solid rgba(255,215,100,0.3); padding-top: 1rem;">
                    © ECOEMY Assessment · Student Copy
                </div>
            `;
            
            const questionsArea = pdfContent.querySelector('#pdfQuestionsArea');
            
            exam.questions.forEach((q, idx) => {
                const qNumber = idx + 1;
                let qHtml = `<div style="margin-bottom: 2rem; background: rgba(255,255,255,0.08); border-radius: 28px; padding: 1.2rem; border-left: 5px solid #ffd966;">
                    <div style="display: flex; justify-content: space-between; flex-wrap: wrap; margin-bottom: 0.5rem;">
                        <strong style="font-size: 1.1rem;">Question ${qNumber} [${q.type === 'mcq' ? 'MCQ' : 'Text based'}]</strong>
                        <span style="background: #ffd96620; padding: 0.2rem 0.8rem; border-radius: 40px;">${q.marks} marks</span>
                    </div>
                    <p style="margin: 0.8rem 0; line-height: 1.4;">${escapeHtml(q.text)}</p>`;
                
                if (q.type === 'mcq' && q.options) {
                    qHtml += `<div style="margin: 0.5rem 0 0 1rem;">`;
                    q.options.forEach((opt, optIdx) => {
                        const letter = String.fromCharCode(65 + optIdx);
                        qHtml += `<div style="margin: 6px 0;">${letter}. ${escapeHtml(opt)}</div>`;
                    });
                    qHtml += `</div><hr style="margin: 10px 0;">`;
                } else if (q.type === 'text') {
                    // Clean answer lines only (no word limit text, no suggestions)
                    const lineCount = Math.min(12, Math.max(4, Math.floor((q.wordLimit || 100) / 12) + 2));
                    qHtml += `<div style="margin: 0.8rem 0 0.5rem 0;">`;
                    for (let l = 0; l < lineCount; l++) {
                        qHtml += `<div style="height: 20px; border-bottom: 1px solid #ffd96680; margin-bottom: 10px; width: 100%;"></div>`;
                    }
                    qHtml += `</div><hr style="margin: 10px 0;">`;
                }
                qHtml += `<div style="margin-top: 6px; font-size: 0.85rem; text-align: right;">[${q.marks} marks]</div>`;
                qHtml += `</div>`;
                questionsArea.innerHTML += qHtml;
